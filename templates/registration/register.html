{% extends 'booking/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-box">
    <h1>Register</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="primary" type="submit">Створити акаунт</button>
    </form>
    <p>Вже є акаунт? <a href="{% url 'login' %}">Увійти</a></p>
</section>
{% endblock %}
