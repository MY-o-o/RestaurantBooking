{% extends 'booking/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-box">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="primary" type="submit">Увійти</button>
    </form>
    <p>Немає акаунта? <a href="{% url 'register' %}">Зареєструватися</a></p>
</section>
{% endblock %}
