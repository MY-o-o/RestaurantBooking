<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Urban Table favicon</title>
  <desc id="desc">A refined restaurant table with a reservation clock.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="tableGrad" x1="32" y1="26" x2="32" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16A5AD"/>
      <stop offset="100%" stop-color="#0B4F52"/>
    </linearGradient>
    <linearGradient id="legGrad" x1="17.5" y1="40" x2="17.5" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D5C5F"/>
      <stop offset="100%" stop-color="#062A2B"/>
    </linearGradient>
    <linearGradient id="clockGrad" x1="45" y1="8" x2="45" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D64D5F"/>
      <stop offset="100%" stop-color="#7A2632"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Front legs -->
    <rect x="12" y="35" width="5" height="14" rx="1.7" fill="url(#legGrad)"/>
    <rect x="41" y="35" width="5" height="14" rx="1.7" fill="url(#legGrad)"/>
    
    <!-- Table body (thickness) -->
    <rect x="10" y="30" width="38" height="8" rx="1.7" fill="#083435"/>
    
    <!-- Table top -->
    <rect x="10" y="26" width="38" height="10" rx="1.5" fill="url(#tableGrad)"/>
    
    <!-- Table highlight -->
    <rect x="14" y="28" width="14" height="3" rx="1.5" fill="#FFFFFF" opacity="0.2"/>
    
    <!-- Clock -->
    <circle cx="45" cy="19" r="11" fill="url(#clockGrad)"/>
    <circle cx="45" cy="19" r="8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Clock hands -->
    <path d="M45 19V14" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M45 19L49 22" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Center pivot -->
    <circle cx="45" cy="19" r="1.5" fill="#FFFFFF"/>
  </g>
</svg>